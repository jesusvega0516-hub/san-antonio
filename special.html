<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            margin: 0; background: #800000; font-family: sans-serif; 
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden;
        }
        
        /* Fixed size container ensures front and back are identical */
        .flip-card {
            background-color: transparent;
            width: 350px; height: 350px; /* Locked size */
            perspective: 1000px;
            margin-bottom: 40px; /* Space above the button */
        }

        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; /* Forces exact overlap */
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            box-sizing: border-box; /* Crucial for alignment */
        }

        .flip-card-front img {
            width: 100%; height: 100%; border-radius: 20px; object-fit: cover;
        }

        .flip-card-back {
            background-color: white;
            transform: rotateY(180deg);
            padding: 20px;
        }

        .barcode-img {
            width: 90%; /* Keeps it inside the white margins */
            height: auto;
            max-height: 180px;
            object-fit: contain;
            margin: 10px 0;
        }

        .back-btn {
            color: white; text-decoration: none; 
            border: 2px solid rgba(255,255,255,0.5); padding: 12px 24px; 
            border-radius: 12px; font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:active { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="flip-card" onclick="this.classList.toggle('flipped')">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <img src="special.png?v=10" alt="Especial">
                <div style="position:absolute; bottom:10px; color:white; font-size:10px; background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:10px;">TAP TO REVEAL</div>
            </div>
            
            <div class="flip-card-back">
                <h3 style="margin: 0; color:#800000; font-size: 22px;">Cupón de Hoy</h3>
                <img src="barcode.png?v=10" class="barcode-img" alt="Barcode">
                <p style="font-weight: bold; color: #333; margin: 5px 0 0 0; font-size: 14px;">MUESTRA ESTO AL CAJERO</p>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-btn">Regresar al Menú</a>

</body>
</html>
