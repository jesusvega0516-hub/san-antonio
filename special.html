<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
/* ... your existing body styles ... */

.flip-card {
    background-color: transparent;
    /* 1. Use VW units for reliable, proportional scaling on all phones */
    width: 90vw;
    height: 90vw;
    /* 2. Set max limits so it doesn't get ridiculously huge on tablets */
    max-width: 450px;
    max-height: 450px;
    perspective: 1000px;
    
    /* 3. Essential: Re-enforce perfect centering using auto margins */
    margin-left: auto;
    margin-right: auto;
    /* Adjust vertical margin to taste to push it away from the status bar */
    margin-top: 10vh; 
    
    /* 4. Ensure no unwanted padding is disrupting the layout box */
    padding: 0;
    
    /* Helps smooth the transition rendering */
    will-change: transform;
}

.flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

.flip-card.flipped .flip-card-inner {
    transform: rotateY(180deg);
}

.flip-card-front, .flip-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    
    /* 5. Crucial: Ensure these panels have absolutely NO padding or margins, 
       otherwise the front and back will render with different content areas. */
    margin: 0;
    padding: 0;
}

/* FRONT: Your Pozole Image (image_0.png) */
.flip-card-front img {
    /* 6. Ensure the image fills its container (image_0.png) completely 
       and adheres to the border-radius of the parent */
    width: 100%;
    height: 100%;
    border-radius: 20px;
    object-fit: cover;
}

/* BACK: Your Barcode Image (image_1.png) */
.flip-card-back {
    background-color: white;
    transform: rotateY(180deg);
    
    /* 7. Re-apply any necessary layout spacing, but keep it tight.
       This controls the vertical stack on the white card. */
    padding: 30px 20px; /* (top/bottom, left/right) */
    flex-direction: column;
}

/* Adjusting the text/image elements inside the back card so they center */
.flip-card-back h3 {
    margin-top: 0;
    color: #800000;
    margin-bottom: 20px; /* Control space below title */
}

.barcode-img {
    width: 100%;
    height: auto;
    max-height: 60%;
    object-fit: contain; /* Keeps barcode scannable */
    margin-bottom: 20px; /* Control space below barcode */
}

.flip-card-back p {
    font-weight: bold;
    color: #333;
    margin: 0; /* Clear default margins that might shift text */
    text-align: center;
}

/* ... your existing .back-btn styles ... */
</style>
</head>
<body>

    <div class="flip-card" onclick="this.classList.toggle('flipped')">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <img src="special.png?v=3" alt="Especial">
            </div>
            
            <div class="flip-card-back">
                <h3 style="margin-top:0; color:#800000;">Cupón de Hoy</h3>
                <img src="barcode.png" class="barcode-img" alt="Barcode">
                <p style="font-weight: bold; color: #333; margin-top: 15px;">MUESTRA ESTO AL CAJERO</p>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-btn">Regresar al Menú</a>

</body>
</html>
