<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            margin: 0; background: #800000; font-family: sans-serif; 
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden;
        }
        
        /* The container that holds the 3D perspective */
        .flip-card {
            background-color: transparent;
            width: 90vw; height: 90vw; max-width: 400px; max-height: 400px;
            perspective: 1000px;
        }

        /* The actual moving part */
        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        /* The class we add with JavaScript to trigger the flip */
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }

        /* Front side (Your Image) */
        .flip-card-front img {
            width: 100%; height: 100%; border-radius: 20px; object-fit: cover;
        }

        /* Back side (The Code) */
        .flip-card-back {
            background-color: white; color: #333;
            transform: rotateY(180deg); flex-direction: column;
            padding: 20px;
        }

        .barcode-placeholder {
            width: 80%; height: 100px; 
            background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 8px);
            margin: 20px 0;
        }

        .back-btn {
            margin-top: 40px; color: white; text-decoration: none; 
            border: 2px solid rgba(255,255,255,0.5); padding: 12px 24px; 
            border-radius: 12px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="flip-card" onclick="this.classList.toggle('flipped')">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <img src="special.png?v=3" alt="Especial">
            </div>
            
            <div class="flip-card-back">
                <h3 style="margin-top:0; color:#800000;">Cupón de Hoy</h3>
                <div class="barcode-placeholder"></div>
                <p style="font-weight: bold; font-size: 1.2rem;">MUESTRA ESTO AL CAJERO</p>
                <p style="font-size: 0.9rem; color: #666;">(El código se generará aquí)</p>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-btn">Regresar al Menú</a>

</body>
</html>
