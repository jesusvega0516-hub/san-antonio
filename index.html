<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>San Antonio Portal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800000">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh;
            background-color: #800000 !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white; overflow: hidden;
            position: fixed;
        }
        #main-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #header {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            transition: all 1s ease-in-out;
            width: 100%;
            z-index: 10;
        }
        #header.moved { top: 18%; } /* Lifted slightly to make room for 4th button */
        
        #splash-logo {
            width: 150px; height: 150px; max-width: 45%;
            display: block; margin: 0 auto;
            border-radius: 22%; overflow: hidden; object-fit: cover;
            backface-visibility: hidden;
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }
        h2 { opacity: 0; margin-top: 10px; font-size: 1.1rem; transition: opacity 0.5s; font-weight: 400; }
        
        .menu-container {
            width: 85%; max-width: 320px;
            display: flex; flex-direction: column; gap: 12px;
            opacity: 0; transform: translateY(20px);
            transition: all 0.6s ease;
            margin-top: 130px;
        }
        .menu-container.visible { opacity: 1; transform: translateY(0); }
        
        .btn {
            background-color: white; color: #800000; border: none;
            padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold;
            text-align: center; text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
            display: block;
        }
        .btn-special { background: #FFD700; color: #333; }
        /* Distinctive color for the Call main button */
        .btn-call-main { background-color: #28a745; color: white; }

        .back-link {
            background: none; border: none; color: white; 
            text-decoration: underline; margin-top: 8px; cursor: pointer;
            font-size: 14px;
        }

        #ios-instructions {
            display: none; background: rgba(255, 255, 255, 0.1);
            border: 1px dashed rgba(255, 255, 255, 0.5);
            border-radius: 12px; padding: 12px; margin-top: 10px;
            color: white; font-size: 13px; text-align: center;
        }
        .share-icon { display: inline-block; width: 18px; vertical-align: middle; margin: 0 3px; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="header">
            <img src="chicken-app.png" id="splash-logo" alt="Logo">
            <h2 id="questionText">¿Qué te gustaría hacer?</h2>
        </div>

        <div class="menu-container" id="menu-box">
            <a href="special.html" class="btn btn-special">🔥 Ver Especial del Día</a>
            <a href="#" class="btn" onclick="toggleMenu('location-box')">🛍️ Ordena en Línea</a>
            <a href="https://my.flexgift.com/Account/Login" class="btn">💳 Mi Saldo de Regalo</a>
            <a href="#" class="btn btn-call-main" onclick="toggleMenu('call-box')">📞 Llamar al Restaurante</a>
            
            <button id="installBtn" class="btn" style="display:none; background-color: rgba(255,255,255,0.2); color: white; border: 1px solid white; margin-top: 5px; font-size: 13px;">
                📲 Instalar App
            </button>

            <div id="ios-instructions">
                Instalar en iPhone: Pulsa <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Ios_share_icon.png" class="share-icon"> y luego <strong>"Agregar al inicio"</strong>
            </div>
        </div>

        <div class="menu-container" id="location-box" style="display:none; opacity:0;">
            <h3 style="text-align:center; margin-bottom:5px;">🛍️ Ordenar Online:</h3>
            <a href="https://order.epipay.com/m4200000556620/en/WebOrder?STORE_CODE=MTAwMA==" target="_blank" class="btn">📍 Monroe</a>
            <a href="#" class="btn" style="opacity: 0.5; pointer-events: none;">📍 Broadway</a>
            <a href="#" class="btn" style="opacity: 0.5; pointer-events: none;">📍 Village</a>
            <button onclick="toggleMenu('menu-box')" class="back-link">Regresar al Menú Principal</button>
        </div>

        <div class="menu-container" id="call-box" style="display:none; opacity:0;">
            <h3 style="text-align:center; margin-bottom:5px;">📞 Llamar a:</h3>
            <a href="tel:1234567890" class="btn">📍 Monroe</a>
            <a href="tel:1234567890" class="btn" style="opacity: 0.5;">📍 Broadway</a>
            <a href="tel:1234567890" class="btn" style="opacity: 0.5;">📍 Village</a>
            <button onclick="toggleMenu('menu-box')" class="back-link">Regresar al Menú Principal</button>
        </div>
    </div>

    <script>
        // Clean toggle function for all menus
        function toggleMenu(targetId) {
            // Hide all potential menus
            const menus = ['menu-box', 'location-box', 'call-box'];
            menus.forEach(id => {
                document.getElementById(id).style.display = 'none';
                document.getElementById(id).style.opacity = '0';
            });

            // Show the target
            const target = document.getElementById(targetId);
            target.style.display = 'flex';
            // Small delay for the fade-in effect
            setTimeout(() => { target.style.opacity = '1'; }, 50);
        }

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        const iosBox = document.getElementById('ios-instructions');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!isStandalone) { installBtn.style.display = 'block'; }
        });

        if (isIOS && !isStandalone) { iosBox.style.display = 'block'; }

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('header').classList.add('moved');
                setTimeout(() => {
                    document.getElementById('menu-box').classList.add('visible');
                    document.getElementById('questionText').style.opacity = '1';
                }, 500);
            }, 1200);
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('pwabuilder-sw.js');
        }
    </script>
</body>
</html>
