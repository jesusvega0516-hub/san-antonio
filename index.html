<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>San Antonio Portal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800000">
    <style>
    /* ... keep your existing styles, but add these ... */
    #header {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #header.moved {
        top: 15%; /* Moves logo up */
    }
    .menu-container {
        margin-top: 150px;
        opacity: 0; /* Hidden at start */
        transition: opacity 1s ease;
    }
    .menu-container.visible {
        opacity: 1; /* Fades in */
    }
</style>

<body>
    <div id="header" id="header-box">
        <img src="chicken-app.png" id="splash-logo" alt="Logo">
        <h2 id="questionText" style="display:none;">¿Qué te gustaría hacer?</h2>
    </div>

    <div class="menu-container" id="menu-box">
        <a href="special.html" class="btn btn-special">🔥 Ver Especial del Día</a>
        <a href="https://my.flexgift.com/Account/Login" class="btn">💳 Mi Saldo de Regalo</a>
    </div>

    <script>
        // This timer creates the "Splash Screen" effect
        setTimeout(() => {
            document.getElementById('header').classList.add('moved');
            document.getElementById('menu-box').classList.add('visible');
            document.getElementById('questionText').style.display = 'block';
        }, 1500); // 1.5 seconds of splash time
    </script>
</body>
</html>
