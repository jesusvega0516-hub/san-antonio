<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>San Antonio Portal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800000">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh;
            background-color: #800000 !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white; overflow: hidden;
            position: fixed;
        }

        /* Corner Language Toggle */
        #lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            z-index: 100;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-tap-highlight-color: transparent;
        }

        #main-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #header {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            transition: all 1s ease-in-out;
            width: 100%;
            z-index: 10;
        }
        #header.moved { top: 18%; }
        
        #splash-logo {
            width: 150px; height: 150px; max-width: 45%;
            display: block; margin: 0 auto;
            border-radius: 22%; overflow: hidden; object-fit: cover;
            backface-visibility: hidden;
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }
        h2 { opacity: 0; margin-top: 10px; font-size: 1.1rem; transition: opacity 0.5s; font-weight: 400; }
        
        .menu-container {
            width: 85%; max-width: 320px;
            display: flex; flex-direction: column; gap: 12px;
            opacity: 0; transform: translateY(20px);
            transition: all 0.6s ease;
            margin-top: 130px;
        }
        .menu-container.visible { opacity: 1; transform: translateY(0); }
        
        .btn {
            background-color: white; color: #800000; border: none;
            padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold;
            text-align: center; text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
            display: block;
        }
        .btn-special { background: #FFD700; color: #333; }
        .btn-call-main { background-color: #28a745; color: white; }

        .back-link {
            background: none; border: none; color: white; 
            text-decoration: underline; margin-top: 8px; cursor: pointer;
            font-size: 14px;
        }

        #ios-instructions {
            display: none; background: rgba(255, 255, 255, 0.1);
            border: 1px dashed rgba(255, 255, 255, 0.5);
            border-radius: 12px; padding: 12px; margin-top: 10px;
            color: white; font-size: 13px; text-align: center;
        }
        .share-icon { display: inline-block; width: 18px; vertical-align: middle; margin: 0 3px; }
    </style>
</head>
<body>

    <button id="lang-toggle" onclick="changeLanguage()">EN / ES</button>

    <div id="main-container">
        <div id="header">
            <img src="chicken-app.png" id="splash-logo" alt="Logo">
            <h2 id="questionText" data-es="¿Qué te gustaría hacer?" data-en="What would you like to do?">¿Qué te gustaría hacer?</h2>
        </div>

        <div class="menu-container" id="menu-box">
            <a href="special.html" class="btn btn-special" data-es="🔥 Ver Especial del Día" data-en="🔥 See Daily Special">🔥 Ver Especial del Día</a>
            <a href="#" class="btn" onclick="toggleMenu('location-box')" data-es="🛍️ Ordena en Línea" data-en="🛍️ Order Online">🛍️ Ordena en Línea</a>
            <a href="https://my.flexgift.com/Account/Login" class="btn" data-es="💳 Mi Saldo de Regalo" data-en="💳 My Gift Balance">💳 Mi Saldo de Regalo</a>
            <a href="#" class="btn btn-call-main" onclick="toggleMenu('call-box')" data-es="📞 Llamar al Restaurante" data-en="📞 Call Restaurant">📞 Llamar al Restaurante</a>
            
            <button id="installBtn" class="btn" style="display:none; background-color: rgba(255,255,255,0.2); color: white; border: 1px solid white; margin-top: 5px; font-size: 13px;" data-es="📲 Instalar App" data-en="📲 Install App">
                📲 Instalar App
            </button>

            <div id="ios-instructions">
                <span data-es="Instalar en iPhone: Pulsa" data-en="Install on iPhone: Tap">Instalar en iPhone: Pulsa</span> 
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Ios_share_icon.png" class="share-icon"> 
                <span data-es="y luego" data-en="and then">y luego</span> 
                <strong>"Agregar al inicio"</strong>
            </div>
        </div>

        <div class="menu-container" id="location-box" style="display:none; opacity:0;">
            <h3 style="text-align:center; margin-bottom:5px;" data-es="🛍️ Ordenar Online:" data-en="🛍️ Order Online:">🛍️ Ordenar Online:</h3>
            <a href="https://order.epipay.com/m4200000556620/en/WebOrder?STORE_CODE=MTAwMA==" target="_blank" class="btn">📍 Monroe</a>
            <a href="#" class="btn" style="opacity: 0.5; pointer-events: none;">📍 Broadway</a>
            <a href="#" class="btn" style="opacity: 0.5; pointer-events: none;">📍 Village</a>
            <button onclick="toggleMenu('menu-box')" class="back-link" data-es="Regresar al Menú Principal" data-en="Back to Main Menu">Regresar al Menú Principal</button>
        </div>

        <div class="menu-container" id="call-box" style="display:none; opacity:0;">
            <h3 style="text-align:center; margin-bottom:5px;" data-es="📞 Llamar a:" data-en="📞 Call:">📞 Llamar a:</h3>
            <a href="tel:9736149666" class="btn">📍 Monroe</a>
            <a href="tel:9732463996" class="btn">📍 Broadway</a>
            <a href="tel:9732726950" class="btn">📍 Village</a>
            <button onclick="toggleMenu('menu-box')" class="back-link" data-es="Regresar al Menú Principal" data-en="Back to Main Menu">Regresar al Menú Principal</button>
        </div>
    </div>

    <script>
        let currentLang = localStorage.getItem('appLang') || 'es';

        function applyLanguage() {
            const elements = document.querySelectorAll('[data-es]');
            elements.forEach(el => {
                el.innerText = el.getAttribute(`data-${currentLang}`);
            });
            document.getElementById('lang-toggle').innerText = currentLang === 'es' ? 'EN / ES' : 'ES / EN';
        }

        function changeLanguage() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            localStorage.setItem('appLang', currentLang);
            applyLanguage();
        }

        function toggleMenu(targetId) {
            const menus = ['menu-box', 'location-box', 'call-box'];
            menus.forEach(id => {
                document.getElementById(id).style.display = 'none';
                document.getElementById(id).style.opacity = '0';
            });
            const target = document.getElementById(targetId);
            target.style.display = 'flex';
            setTimeout(() => { target.style.opacity = '1'; }, 50);
        }

        // Initialize language on load
        applyLanguage();

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('header').classList.add('moved');
                setTimeout(() => {
                    document.getElementById('menu-box').classList.add('visible');
                    document.getElementById('questionText').style.opacity = '1';
                }, 500);
            }, 1200);
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('pwabuilder-sw.js');
        }
    </script>
</body>
</html>
