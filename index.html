<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>San Antonio Portal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800000">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #800000; font-family: sans-serif;
            color: white; overflow: hidden;
        }
        #header {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }
        #header.moved {
            top: 20%;
        }
        #splash-logo {
            width: 150px; height: auto;
        }
        h2 { 
            opacity: 0; 
            transition: opacity 0.5s; 
            font-weight: 300;
            margin-top: 20px;
        }
        .menu-container {
            position: absolute;
            top: 45%; left: 50%;
            transform: translateX(-50%);
            width: 85%; max-width: 400px;
            display: flex; flex-direction: column; gap: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }
        .menu-container.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .btn {
            background-color: white; color: #800000; border: none;
            padding: 20px; border-radius: 12px; font-size: 18px; font-weight: bold;
            text-align: center; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-special { background-color: #FFD700; color: #333; }
    </style>
</head>
<body>

    <div id="header">
        <img src="chicken-app.png" id="splash-logo" alt="Logo">
        <h2 id="questionText">¿Qué te gustaría hacer?</h2>
    </div>

    <div class="menu-container" id="menu-box">
        <a href="special.html" class="btn btn-special">🔥 Ver Especial del Día</a>
        <a href="https://my.flexgift.com/Account/Login" class="btn">💳 Mi Saldo de Regalo</a>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('header').classList.add('moved');
                document.getElementById('menu-box').classList.add('visible');
                document.getElementById('questionText').style.opacity = '1';
            }, 1500);
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('pwabuilder-sw.js');
        }
    </script>
</body>
</html>
