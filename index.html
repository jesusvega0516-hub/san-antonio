<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>San Antonio Portal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800000">
    <style>
        /* Force the background color on everything */
        html, body {
            background-color: #800000 !important;
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #header {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 90%;
            z-index: 10;
        }

        /* This is the move-up position for mobile */
        #header.moved {
            top: 18%;
        }

        #splash-logo {
            width: 180px; /* Controlled size for mobile */
            max-width: 60%;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        h2 { 
            opacity: 0; 
            transition: opacity 0.8s; 
            font-weight: 400;
            margin-top: 15px;
            font-size: 1.2rem;
        }

        .menu-container {
            position: absolute;
            top: 55%; /* Positioned below the moved logo */
            width: 85%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 5;
        }

        .menu-container.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .btn {
            background-color: white;
            color: #800000;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: block;
        }

        .btn-special {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #333;
        }
    </style>
</head>
<body>

    <div id="header">
        <img src="chicken-app.png" id="splash-logo" alt="Logo">
        <h2 id="questionText">¿Qué te gustaría hacer?</h2>
    </div>

    <div class="menu-container" id="menu-box">
        <a href="special.html" class="btn btn-special">🔥 Ver Especial del Día</a>
        <a href="https://my.flexgift.com/Account/Login" class="btn">💳 Mi Saldo de Regalo</a>
    </div>

    <script>
        // Use a slight delay to ensure the browser has rendered the burgundy background first
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('header').classList.add('moved');
                setTimeout(() => {
                    document.getElementById('menu-box').classList.add('visible');
                    document.getElementById('questionText').style.opacity = '1';
                }, 400); // Buttons appear shortly after logo starts moving
            }, 1800); // Time logo stays in center
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('pwabuilder-sw.js');
        }
    </script>
</body>
</html>
