<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>San Antonio Portal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800000">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh;
            background-color: #800000 !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white; overflow: hidden;
            position: fixed; /* Prevents scrolling/bouncing on mobile */
        }
        #main-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #header {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            transition: all 1s ease-in-out;
            width: 100%;
            z-index: 10;
        }
        #header.moved {
            top: 20%;
        }
        #splash-logo {
            width: 160px; height: auto;
            max-width: 50%;
            display: block; margin: 0 auto;
        }
        h2 { 
            opacity: 0; margin-top: 15px; font-size: 1.2rem;
            transition: opacity 0.5s; font-weight: 400;
        }
        .menu-container {
            width: 85%; max-width: 320px;
            display: flex; flex-direction: column; gap: 15px;
            opacity: 0; transform: translateY(20px);
            transition: all 0.8s ease;
            margin-top: 120px; /* Space for the moved logo */
        }
        .menu-container.visible {
            opacity: 1; transform: translateY(0);
        }
        .btn {
            background-color: white; color: #800000; border: none;
            padding: 18px; border-radius: 12px; font-size: 17px; font-weight: bold;
            text-align: center; text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-special { background: #FFD700; color: #333; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="header">
            <img src="chicken-app.png" id="splash-logo" alt="Logo">
            <h2 id="questionText">¿Qué te gustaría hacer?</h2>
        </div>

     <div class="menu-container" id="menu-box">
            <a href="special.html" class="btn btn-special">🔥 Ver Especial del Día</a>
            <a href="#" class="btn" onclick="showLocations()">🛍️ Ordena en Línea</a>
            <a href="https://my.flexgift.com/Account/Login" class="btn">💳 Mi Saldo de Regalo</a>
            
            <button id="installBtn" class="btn" style="display:none; background-color: rgba(255,255,255,0.2); color: white; border: 1px solid white; margin-top: 10px; font-size: 14px;">
                📲 Instalar App
            </button>
        </div>

        <div class="menu-container" id="location-box" style="display:none; opacity:0;">
            <h3 style="text-align:center; margin-bottom:10px;">Selecciona Ubicación:</h3>
            <a href="INSERT_MONROE_LINK_HERE" target="_blank" class="btn">📍 Monroe Location</a>
            <a href="INSERT_BROADWAY_LINK_HERE" target="_blank" class="btn">📍 Broadway Location</a>
            <a href="INSERT_VILLAGE_LINK_HERE" target="_blank" class="btn">📍 Village Location</a>
            
            <button onclick="showMainMenu()" style="background:none; border:none; color:white; text-decoration:underline; margin-top:10px; cursor:pointer;">
                Regresar al Menú Principal
            </button>
        </div>
    </div>

    <script>
        // TOGGLE MENUS
        function showLocations() {
            document.getElementById('menu-box').style.display = 'none';
            const locBox = document.getElementById('location-box');
            locBox.style.display = 'flex';
            setTimeout(() => { locBox.style.opacity = '1'; }, 50);
        }

        function showMainMenu() {
            document.getElementById('location-box').style.display = 'none';
            document.getElementById('location-box').style.opacity = '0';
            document.getElementById('menu-box').style.display = 'flex';
        }

        // INSTALL LOGIC
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // ENTRANCE ANIMATION
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('header').classList.add('moved');
                setTimeout(() => {
                    document.getElementById('menu-box').classList.add('visible');
                    document.getElementById('questionText').style.opacity = '1';
                }, 500);
            }, 1200);
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('pwabuilder-sw.js');
        }
    </script>
</body>
</html>
